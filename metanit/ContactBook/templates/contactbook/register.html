{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="registration">
    <form method="post" action="{% url 'contactbook:register' %}">
        {% csrf_token %}
        <div class="reg">
            <h1>Регистрация</h1>
            <div class="pole-vvoda">
                <label for="login">Логин: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="text" placeholder="Введите логин" id="login" name="username" required>
            </div>
            <div class="pole-vvoda">
                <label for="email">Почта: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="email" placeholder="Введите почту" id="email" name="email" required>
            </div>
            <div class="pole-vvoda">
                <label for="pass">Пароль: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="password" placeholder="Введите пароль (не менее 6 символов)" id="pass" name="password" minlength="6" required>
            </div>
            <div class="pole-vvoda">
                <label for="confrm_pass">Подтверждение: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="password" placeholder="Повторите пароль" id="confrm_pass" name="confirm_password" required>
            </div>
            <div class="pole-vvoda">
                <label for="last_name">Фамилия: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="text" placeholder="Введите фамилию" id="last_name" name="last_name" required>
            </div>
            <div class="pole-vvoda">
                <label for="first_name">Имя: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="text" placeholder="Введите имя" id="first_name" name="first_name" required>
            </div>
            <div class="pole-vvoda">
                <label for="middle_name">Отчество:</label>
                <input type="text" placeholder="Введите отчество" id="middle_name" name="middle_name" required>
            </div>
            <div class="pole-vvoda">
                <label for="dept">Отдел: <b class="obyaz" title="Обязательное поле">*</b></label>
                <select name="department" id="dept" class="select">
                    <option value="">Все отделы</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if dept_id == dept.id|stringformat:"s" %}selected{% endif %}>
                            {{ dept.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="pole-vvoda">
                <label for="sub">Подразделение:</label>
                <select name="subdivision" id="sub" class="select">
                    <option value="">Сначала выберите отдел</option>
                </select>
            </div>
            <div class="pole-vvoda">
                <label for="position">Должность: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="text" placeholder="Введите должность" id="position" name="position" required>
            </div>
            <div class="pole-vvoda">
                <label for="phone">Номер телефона: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="tel" placeholder="Введите номер телефона" id="phone" name="phone" required>
            </div>
            <div class="pole-vvoda">
                <label for="floor">Этаж: <b class="obyaz" title="Обязательное поле">*</b></label>
                <input type="text" placeholder="Введите этаж" id="floor" name="floor" required>
            </div>
            <div class="pole-vvoda">
                <label for="cab">Кабинет:</label>
                <input type="text" placeholder="Введите кабинет" id="cab" name="cabinet" required>
            </div>
            {% if form.non_field_errors %}
                <div class="error-box">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}
            <button type="submit" href="{% url 'contactbook:login' %}" class="btn">Зарегистрироваться</button>
            <div class="link">
                <p>Есть аккаунт?</p>
                <a href="{% url 'contactbook:login' %}">Войти</a>
            </div>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const deptSelect = document.getElementById('dept');
        const subSelect = document.getElementById('sub');
        
        function loadSubdivisions(deptId) {
            subSelect.innerHTML = '<option value="">Нет</option>';
            
            if (!deptId) {
                subSelect.disabled = true;
                return;
            }

            subSelect.disabled = false;

            fetch(`/api/subdivisions/?dept_id=${deptId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.subdivisions && data.subdivisions.length > 0) {
                        data.subdivisions.forEach(sub => {
                            const opt = document.createElement('option');
                            opt.value = sub.id;
                            opt.textContent = sub.name;
                            subSelect.appendChild(opt);
                        });
                    }
                })
                .catch(err => console.error('Ошибка загрузки подразделений:', err));
        }

        deptSelect.addEventListener('change', () => loadSubdivisions(deptSelect.value));
    });
</script>
{% endblock %}
