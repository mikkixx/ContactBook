{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-card">
    <form method="post" action="{% url 'contactbook:register' %}">
        {% csrf_token %}
        <div class="form">
            <h1>Регистрация</h1>
            <!--логин-->
            <div class="row">
                <label for="login">Логин: </label>
                <input type="text" placeholder="Введите логин" id="login" name="username" required>
            </div>
            <!--email-->
            <div class="row">
                <label for="email">Почта: </label>
                <input type="email" placeholder="Введите email" id="email" name="email" required>
            </div>
             <!--Пароль-->
            <div class="row">
                <label for="pass">Пароль:</label>
                <input type="password" placeholder="Введите пароль(не менее 6 символов)" id="pass" name="password" minlength="6" required>
            </div>
             <!--подтверждение пароля-->
            <div class="row">
                <label for="confrm_pass">Повторите пароль:</label>
                <input type="password" placeholder="Повторите пароль" id="confrm_pass" name="confirm_password" required>
            </div>
             <!--фамилия-->
            <div class="row">
                <label for="last_name">Фамилия:</label>
                <input type="text" placeholder="Введите фамилию" id="last_name" name="last_name" required>
            </div>
             <!--имя-->
            <div class="row">
                <label for="first_name">Имя:</label>
                <input type="text" placeholder="Введите имя" id="first_name" name="first_name" required>
            </div>
             <!--отчество-->
            <div class="row">
                <label for="middle_name">Отчество:</label>
                <input type="text" placeholder="Введите отчество" id="middle_name" name="middle_name" required>
            </div>
            <div class="elements">
                <!--выпадающий список отедлов-->
                <label for="dept-select">Выберите отдел:</label>
                <select name="department" id="depыt-select">
                    <option value="">Все отделы</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if dept_id == dept.id|stringformat:"s" %}selected{% endif %}>
                            {{ dept.name }}
                        </option>
                    {% endfor %}
                </select>
                 <!--выпадающий список подразделенй-->
                <label for="sub-select">Выберите подразделение:</label>
                <select name="subdivision" id="sub-select">
                    <option value="">Нет</option>
                </select>
            </div>
            <!--должность-->
            <div class="row">
                <label for="position">Должность:</label>
                <input type="text" placeholder="Введите должность" id="position" name="position" required>
            </div>
            <!--номер тел.-->
            <div class="row">
                <label for="phone">Номер телефона:</label>
                <input type="tel" placeholder="Введите номер телефона" id="phone" name="phone" required>
            </div>
            <!--этаж-->
            <div class="row">
                <label for="floor">Этаж:</label>
                <input type="text" placeholder="Введите этаж" id="floor" name="floor" required>
            </div>
            <!--кабинет-->
            <div class="row">
                <label for="cab">Кабинет:</label>
                <input type="text" placeholder="Введите кабинет" id="cab" name="cabinet" required>
            </div>
            {% if form.non_field_errors %}
                <div class="error-box">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}
            
            <button type="submit" href="{% url 'contactbook:login' %}">Зарегистрироваться</button>
            <div class="link">
                <p>Есть аккаунт?</p>
                <a href="{% url 'contactbook:login' %}">Войти</a>
            </div>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const deptSelect = document.getElementById('dept-select');
    const subSelect = document.getElementById('sub-select');

    function loadSubdivisions(deptId) {
        subSelect.innerHTML = '<option value="">Нет</option>';
        if (!deptId) return;

        fetch(`/api/subdivisions/?dept_id=${deptId}`)
            .then(res => res.json())
            .then(data => {
                if (data.subdivisions.length > 0) {
                    const allOpt = document.createElement('option');
                    allOpt.value = "";
                    allOpt.textContent = "Все подразделения";
                    subSelect.appendChild(allOpt);

                    data.subdivisions.forEach(sub => {
                        const opt = document.createElement('option');
                        opt.value = sub.id;
                        opt.textContent = sub.name;
                        if ("{{ sub_id }}" === String(sub.id)) opt.selected = true;
                        subSelect.appendChild(opt);
                    });
                }
            });
    }

    deptSelect.addEventListener('change', () => loadSubdivisions(deptSelect.value));
    if (deptSelect.value) loadSubdivisions(deptSelect.value);
});
</script>
{% endblock %}
