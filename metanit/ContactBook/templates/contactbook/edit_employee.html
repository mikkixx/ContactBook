{% extends "base.html" %}
{% block content %}
<h2>Редактирование: {{ employee.last_name }} {{ employee.first_name }}</h2>

<form method="post" class="row g-3">
  {% csrf_token %}
  
  <div class="col-md-4">
    <label class="form-label">Фамилия *</label>
    <input type="text" name="last_name" class="form-control" value="{{ employee.last_name }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Имя *</label>
    <input type="text" name="first_name" class="form-control" value="{{ employee.first_name }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Отчество</label>
    <input type="text" name="middle_name" class="form-control" value="{{ employee.middle_name|default:'' }}">
  </div>
  
  <div class="col-md-6">
    <label class="form-label">Должность *</label>
    <input type="text" name="position" class="form-control" value="{{ employee.position }}" required>
  </div>
  <div class="col-md-6">
    <label class="form-label">Отдел *</label>
    <select name="department" class="form-select" required>
      <option value="">Выберите отдел</option>
      {% for dept in departments %}
        <option value="{{ dept.id }}" {% if employee.department_id == dept.id %}selected{% endif %}>
          {{ dept.name }}
        </option>
      {% endfor %}
    </select>
  </div>
  
  <div class="col-md-6">
    <label class="form-label">Подразделение</label>
    <select name="subdivision" class="form-select">
      <option value="">Не назначено</option>
      {% for sub in subdivisions %}
        <option value="{{ sub.id }}" {% if employee.subdivision_id == sub.id %}selected{% endif %}>
          {{ sub.name }}
        </option>
      {% endfor %}
    </select>
  </div>
  
  <div class="col-md-6">
    <label class="form-label">Телефон *</label>
    <input type="text" name="phone" class="form-control" value="{{ employee.phone }}" required>
  </div>
  
  <div class="col-md-4">
    <label class="form-label">Этаж *</label>
    <input type="text" name="floor" class="form-control" value="{{ employee.floor }}" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Кабинет</label>
    <input type="text" name="cabinet" class="form-control" value="{{ employee.cabinet|default:'' }}">
  </div>
  
  <div class="col-12">
    <label class="form-label">Email (для входа) *</label>
    <input type="email" name="email" class="form-control" value="{{ user_email }}" required>
  </div>
  
  <div class="col-12">
    <label class="form-label">Роль</label>
    <select name="role" class="form-select">
      <option value="user" {% if employee.role == 'user' %}selected{% endif %}>Пользователь</option>
      <option value="admin" {% if employee.role == 'admin' %}selected{% endif %}>Администратор</option>
    </select>
  </div>
  
  <div class="col-12 mt-4">
    <button type="submit" class="btn btn-success">💾 Сохранить изменения</button>
    <a href="{% url 'contactbook:employee_detail' employee.pk %}" class="btn btn-secondary">↩️ Отмена</a>
  </div>
</form>
{% endblock %}
