<form method="get" class="row g-2 mb-3">
  <div class="col-md-3">
    <input type="text" name="search" class="form-control" placeholder="Поиск по ФИО" value="{{ search|default:'' }}">
  </div>
  <div class="col-md-2">
    <select name="department" class="form-select">
      <option value="">Все отделы</option>
      {% for dept in departments %}
        <option value="{{ dept.id }}" {% if dept_id == dept.id|stringformat:"s" %}selected{% endif %}>
          {{ dept.name }}
        </option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-2">
    <select name="subdivision" class="form-select">
      <option value="">Все подразделения</option>
      {% for sub in subdivisions %}
        <option value="{{ sub.id }}" {% if sub_id == sub.id|stringformat:"s" %}selected{% endif %}>
          {{ sub.name }}
        </option>
      {% endfor %}
    </select>
  </div>
  <div class="col-md-2">
    <input type="text" name="position" class="form-control" placeholder="Должность" value="{{ position|default:'' }}">
  </div>
  <div class="col-md-2">
    <button type="submit" class="btn btn-primary w-100">🔍 Найти</button>
  </div>
  <div class="col-md-1">
    <a href="{% url 'contactbook:employee_list' %}" class="btn btn-outline-secondary w-100">✖</a>
  </div>
</form>
