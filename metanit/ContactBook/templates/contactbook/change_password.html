{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="reg">
    <h1>Смена пароля</h1>
    
    <form method="post" class="form">
        {% csrf_token %}
        
        <div class="row">
            <label for="current_password">Текущий пароль:</label>
            <input type="password" id="current_password" name="current_password" placeholder="Введите текущий пароль" required>
        </div>
        
        <div class="row">
            <label for="new_password">Новый пароль:</label>
            <input type="password" id="new_password" name="new_password" placeholder="Не менее 6 символов" required>
        </div>
        
        <div class="row">
            <label for="confirm_password">Подтверждение:</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторите пароль" required>
        </div>
        
        <div class="form-buttons">
            <button type="submit" class="btn-primary">Подтвердить</button>
            <a href="{% url 'contactbook:my_profile' %}" class="btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
